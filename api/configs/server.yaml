label: "Logic Server (Microservice)"
fields:
  - name: "service_name"
    label: "Service Name"
    type: "text"
    default: "driver-matching"
  - name: "image_name"
    label: "Docker Image Name"
    type: "text"
    default: "uber/driver-matching"
  - name: "repository_url"
    label: "Repository URL"
    type: "text"
    default: "https://github.com/uber/driver-matching"
  - name: "tag"
    label: "Image Tag"
    type: "text"
    default: "latest"
  - name: "port"
    label: "Service Port"
    type: "number"
    default: 8080
  - name: "replicas"
    label: "Replicas"
    type: "number"
    default: 3
  - name: "env_vars"
    label: "Env Variables (KEY=VAL)"
    type: "text"
    default: "LOG_LEVEL=info"
