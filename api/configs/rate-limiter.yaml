label: "Rate Limiter"
fields:
  - name: "rate"
    label: "Requests Per Second (RPS)"
    type: "number"
    default: 100
  - name: "burst"
    label: "Burst Capacity"
    type: "number"
    default: 150
  - name: "strategy"
    label: "Limiting Strategy"
    type: "select"
    options: ["token-bucket", "leaky-bucket", "fixed-window"]
    default: "token-bucket"
