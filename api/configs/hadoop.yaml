label: "Hadoop Cluster"
fields:
  - name: "fs_default_name"
    label: "FS Default Name (hdfs://)"
    type: "text"
    default: "hdfs://namenode:9000"
  - name: "dfs_replication"
    label: "DFS Replication"
    type: "number"
    default: 3
  - name: "dfs_namenode_name_dir"
    label: "Namenode Name Dir"
    type: "text"
    default: "/hadoop/dfs/name"
  - name: "dfs_datanode_data_dir"
    label: "Datanode Data Dir"
    type: "text"
    default: "/hadoop/dfs/data"
  - name: "yarn_resourcemanager_hostname"
    label: "YARN ResourceManager Hostname"
    type: "text"
    default: "resourcemanager"
  - name: "yarn_nodemanager_resource_memory_mb"
    label: "NodeManager Memory (MB)"
    type: "number"
    default: 8192
